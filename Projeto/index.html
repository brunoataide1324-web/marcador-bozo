<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marcador de Bozó</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Configuração do Ícone do Aplicativo -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- 1. TELA DE SPLASH (CARREGAMENTO) -->
  <div id="splashScreen" class="screen">
    <div class="splash-card">
      <img src="icon.svg" class="splash-icon" alt="Bozó Logo" style="width: 96px; height: 96px; display: block; margin: 0 auto 16px auto;">
      <h1 class="splash-title">BOZÓ</h1>
    </div>
  </div>

  <!-- 2. TELA DO MENU PRINCIPAL -->
  <div id="menuScreen" class="screen hidden">
    <div class="menu-card">
      <h1>BOZÓ</h1>
      <div class="menu-actions">
        <button id="startGameBtn">▶ Jogar</button>
        <button id="settingsBtn" class="secondary">⚙️ Configurações</button>
        <!-- Botão de Instalar no Celular (Gerenciado via JS) -->
        <button id="installAppBtn" class="secondary hidden" style="border-color: var(--color-primary); color: var(--color-primary);">
          📥 Baixar Aplicativo
        </button>
      </div>
    </div>
  </div>

  <!-- 3. TELA DE GERENCIAMENTO DE JOGADORES -->
  <div id="playerScreen" class="screen hidden">
    <div class="panel header-panel">
      <button id="backToMenuBtn" class="icon-button">◀</button>
      <h2>Jogadores</h2>
      <div style="width: 42px;"></div>
    </div>

    <div class="player-card">
      <button id="addPlayerModalBtn" class="add-player-button">+ Adicionar Novo Jogador</button>
      
      <div id="playerList" class="player-list">
        <!-- Jogadores entram aqui via JS -->
      </div>
      <div id="emptyPlayerLabel" class="player-empty">Nenhum jogador adicionado</div>

      <button id="goToMatchBtn" class="action-button">Começar Partida ➔</button>
    </div>
  </div>

  <!-- 4. TELA PRINCIPAL DO JOGO (TABELA DE PONTOS + GRID) -->
  <div id="gameScreen" class="screen hidden">
    <!-- Painel Superior: Placar Geral da Partida -->
    <div class="panel score-summary-card">
      <div class="score-table">
        <div class="score-table-column">
          <div class="score-table-title">Esta Partida</div>
          <div id="matchScores"></div>
        </div>
        <div class="score-table-column">
          <div class="score-table-title">Vitórias (Geral)</div>
          <div id="overallScores"></div>
        </div>
      </div>
    </div>

    <!-- Navegação entre os Jogadores com Botão Voltar Integrado -->
    <div class="panel header-panel player-navigation">
      <button id="backToPlayersBtn" class="icon-button" style="width: 38px; height: 38px; font-size: 0.9rem;">◀</button>
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="prevPlayerBtn" class="nav-button">◀</button>
        <h2 id="currentPlayerName" class="game-player-name">JOGADOR</h2>
        <button id="nextPlayerBtn" class="nav-button">▶</button>
      </div>
      <div style="width: 38px;"></div>
    </div>

    <!-- Grid de Botões do Bozó -->
    <div id="categoryGrid" class="category-grid">
      <!-- Botões gerados via JS -->
    </div>
  </div>

  <!-- 5. TELA DE CONFIGURAÇÕES -->
  <div id="settingsScreen" class="screen hidden">
    <div class="panel header-panel">
      <button id="backToMenuFromSettingsBtn" class="icon-button">◀</button>
      <h2>Configurações</h2>
      <div style="width: 42px;"></div>
    </div>

    <div class="settings-card">
      <!-- Seção de Temas -->
      <div class="settings-section">
        <h3>Aparência</h3>
        <div class="theme-toggle-container">
          <button id="themeLightBtn" class="theme-btn">☀️ Claro</button>
          <button id="themeDarkBtn" class="theme-btn active">🌙 Escuro</button>
        </div>
      </div>

      <hr class="settings-divider">

      <!-- Seção de Histórico -->
      <div class="settings-section">
        <h3>Histórico de Partidas</h3>
        <div id="matchHistoryList" class="history-list">
          <!-- As partidas serão injetadas aqui pelo JS -->
        </div>
        <button id="clearHistoryBtn" class="secondary danger-button-text" style="margin-top: 12px; padding: 10px; font-size: 0.9rem;">
          🗑️ Limpar Histórico
        </button>
      </div>
    </div>
  </div>

  <!-- MODAIS (POPUPS INTERATIVOS) -->
  <!-- Modal 1: Adicionar Jogador -->
  <div id="playerModal" class="modal hidden">
    <div class="modal-card">
      <h3>Novo Jogador</h3>
      <input type="text" id="newPlayerName" placeholder="Nome do jogador" maxlength="15" autocomplete="off">
      <div class="modal-actions">
        <button id="cancelAddPlayerBtn" class="secondary">Cancelar</button>
        <button id="confirmAddPlayerBtn">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal 2: Seleção de Pontuação / Riscar -->
  <div id="scoreSelectModal" class="modal hidden">
    <div class="modal-card">
      <h3 id="scoreSelectTitle">Pontuação</h3>
      <div id="scoreSelectOptions" class="select-options">
        <!-- Opções geradas pelo JS -->
      </div>
      <button id="closeScoreSelectBtn" class="secondary">Fechar</button>
    </div>
  </div>

  <!-- Modal 3: Tela de Vitória -->
  <div id="victoryModal" class="modal hidden">
    <div class="modal-card victory-card">
      <div class="victory-trophy">🏆</div>
      <h3>Temos um Campeão!</h3>
      <div id="victoryPlayerName" class="victory-player-name">JOGADOR</div>
      <button id="continueBtn">Nova Partida</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
